<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Mobile Control Panel · Spatial Iteration Engine</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="mcp.css">
<style>
  html, body { margin: 0; padding: 0; background: #0a0a10; min-height: 100vh; }
  body { font-family: "Inter", system-ui, sans-serif; color: #e8ebf5; }
  .wrap { max-width: 1800px; margin: 0 auto; padding: 40px 24px 60px; }
  .title { font-family: "JetBrains Mono", monospace; font-size: 22px; font-weight: 700; letter-spacing: -0.01em; color: #e8ebf5; }
  .sub { font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #7a7f9e; margin-top: 6px; }
  .grid { display: grid; grid-template-columns: repeat(4, auto); gap: 32px; justify-content: center; margin-top: 36px; }
  @media (max-width: 1700px) { .grid { grid-template-columns: repeat(2, auto); } }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">Mobile Control Panel</div>
  <div class="sub">Spatial Iteration Engine · phone-only · cyberpunk neon</div>
  <div id="root" class="grid"></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Shell.jsx"></script>
<script type="text/babel" src="Controls.jsx"></script>
<script type="text/babel" src="Screens.jsx"></script>
<script type="text/babel">
  function App() {
    return (
      <>
        <HubScreen/>
        <DistortScreen/>
        <ColorScreen/>
        <SpecScreen/>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
