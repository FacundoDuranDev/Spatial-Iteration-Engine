<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>S1 · Home — Spatial-Iteration-Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="components.css">
</head>
<body class="mcp-host">
<div class="phone mcp-root mcp-scan" data-screen-label="S1 Home">

  <!-- Header -->
  <header class="hdr">
    <div style="display:flex; align-items:center; gap:10px; flex:1;">
      <span class="pill pill-running"><span class="pill-dot"></span>RUNNING</span>
      <span class="mcp-num" style="color:var(--cyan); font-size:13px; text-shadow:0 0 6px rgba(0,255,242,0.35);">45.2 FPS</span>
    </div>
    <span class="hdr-ip mcp-num">192.168.1.38</span>
    <button class="hdr-gear" aria-label="Config">
      <!-- gear glyph -->
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/>
      </svg>
    </button>
  </header>

  <!-- Scene line -->
  <div class="scene">
    <span class="scene-kicker">Scene ·</span>
    <span class="scene-name">MP3_NOIR</span>
  </div>

  <!-- Category cards -->
  <div class="card-grid">

    <button class="cat-card has-active">
      <svg class="cat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4"/>
        <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
      </svg>
      <span class="cat-name">Color</span>
      <span class="cat-count on">3 / 7 ON</span>
    </button>

    <button class="cat-card has-active">
      <svg class="cat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 20 L20 4"/>
        <path d="M4 12 L12 4"/>
        <path d="M12 20 L20 12"/>
      </svg>
      <span class="cat-name">Stylize</span>
      <span class="cat-count on">1 / 9 ON</span>
    </button>

    <button class="cat-card has-active">
      <svg class="cat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <!-- prism -->
        <path d="M12 3 L21 20 L3 20 Z"/>
        <path d="M12 3 L12 20"/>
      </svg>
      <span class="cat-name">Distort</span>
      <span class="cat-count on">2 / 8 ON</span>
    </button>

    <button class="cat-card">
      <svg class="cat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <!-- glitch / bars -->
        <path d="M3 7 L10 7"/>
        <path d="M14 7 L21 7"/>
        <path d="M3 12 L7 12"/>
        <path d="M11 12 L21 12"/>
        <path d="M3 17 L14 17"/>
        <path d="M18 17 L21 17"/>
      </svg>
      <span class="cat-name">Glitch / FX</span>
      <span class="cat-count">0 / 9 ON</span>
    </button>

    <button class="cat-card has-active">
      <svg class="cat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <!-- eye -->
        <path d="M2 12 C 5 5, 19 5, 22 12 C 19 19, 5 19, 2 12 Z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      <span class="cat-name">Perception</span>
      <span class="cat-count on">1 / 6 ON</span>
    </button>

    <button class="cat-card">
      <svg class="cat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <!-- stacked tiles -->
        <rect x="3" y="3" width="8" height="8"/>
        <rect x="13" y="3" width="8" height="8"/>
        <rect x="3" y="13" width="8" height="8"/>
        <rect x="13" y="13" width="8" height="8"/>
      </svg>
      <span class="cat-name">Presets</span>
      <span class="cat-count">5 SAVED</span>
    </button>

  </div>

  <div style="flex:1;"></div>

  <!-- Footer -->
  <footer class="ftr">
    <button class="btn-stop">STOP</button>
    <button class="btn-ghost">
      <small>Scene</small>
      <b>MP3_NOIR ▾</b>
    </button>
    <button class="btn-ghost" style="flex:0.8;">
      <small>&nbsp;</small>
      <b style="color:var(--text-2);">RESET</b>
    </button>
  </footer>
</div>
</body>
</html>
