<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-0);font-family:var(--font-mono);color:var(--fg-0)}
  .card{padding:20px;box-sizing:border-box;width:700px;height:200px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .sw{border-radius:var(--radius-2);padding:12px;display:flex;flex-direction:column;gap:6px;font-size:11px;border:var(--border-hairline)}
  .chip{height:48px;border-radius:var(--radius-1)}
  .name{font-weight:600}
  .hex{color:var(--fg-2);letter-spacing:0.04em}
  .role{color:var(--fg-3);font-size:10px;line-height:1.3}
</style>
</head>
<body>
<div class="card">
  <div class="sw"><div class="chip" style="background:#9dff4e"></div><span class="name">accent / phosphor</span><span class="hex">#9DFF4E</span><span class="role">live · ok · ASCII fg</span></div>
  <div class="sw"><div class="chip" style="background:#ffb454"></div><span class="name">amber</span><span class="hex">#FFB454</span><span class="role">processing · warn</span></div>
  <div class="sw"><div class="chip" style="background:#5ecfff"></div><span class="name">cyan</span><span class="hex">#5ECFFF</span><span class="role">network · UDP · host</span></div>
  <div class="sw"><div class="chip" style="background:#ff6ac1"></div><span class="name">magenta</span><span class="hex">#FF6AC1</span><span class="role">perception · IA · style</span></div>
</div>
</body>
</html>
