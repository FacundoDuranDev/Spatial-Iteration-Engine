<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-0);font-family:var(--font-mono);color:var(--fg-0)}
  .card{padding:20px;box-sizing:border-box;width:700px;height:160px;display:flex;gap:12px}
  .sw{flex:1;border-radius:var(--radius-2);border:var(--border-hairline);padding:10px;display:flex;flex-direction:column;justify-content:space-between;font-size:11px;line-height:1.3}
  .sw .name{color:var(--fg-0);font-weight:600}
  .sw .hex{color:var(--fg-2);letter-spacing:0.04em}
  .sw .role{color:var(--fg-3);font-size:10px}
</style>
</head>
<body>
<div class="card">
  <div class="sw" style="background:#0a0c0d"><span><span class="name">bg-0</span></span><span class="hex">#0A0C0D</span><span class="role">page base</span></div>
  <div class="sw" style="background:#101315"><span><span class="name">bg-1</span></span><span class="hex">#101315</span><span class="role">card</span></div>
  <div class="sw" style="background:#171b1e"><span><span class="name">bg-2</span></span><span class="hex">#171B1E</span><span class="role">hover / raised</span></div>
  <div class="sw" style="background:#21272b"><span><span class="name">bg-3</span></span><span class="hex">#21272B</span><span class="role">border / divider</span></div>
  <div class="sw" style="background:#f2efe8;color:#0a0c0d;border-color:#d8d5ce"><span><span class="name" style="color:#0a0c0d">bg-inverse</span></span><span class="hex" style="color:#5a564c">#F2EFE8</span><span class="role" style="color:#8a8576">paper</span></div>
</div>
</body>
</html>
