<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-0);color:var(--fg-0);font-family:var(--font-mono)}
  .card{padding:20px;box-sizing:border-box;width:700px;height:340px;display:flex;flex-direction:column;gap:12px;justify-content:center}
  .group{padding:14px 16px;background:var(--bg-1);border:1px solid var(--bg-3);border-radius:3px;display:flex;flex-direction:column;gap:10px}
  .gh{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--fg-2);display:flex;align-items:center;gap:6px}
  .gh .dot{width:6px;height:6px;border-radius:50%}
  .row{display:grid;gap:12px}
  .r3{grid-template-columns:1fr 1.4fr 1fr}
  .r2{grid-template-columns:1fr 1fr}
  .field{display:flex;flex-direction:column;gap:5px;min-width:0}
  label{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--fg-2)}
  input,select{font-family:var(--font-mono);font-size:13px;padding:6px 10px;background:var(--bg-0);color:var(--fg-0);border:1px solid var(--bg-3);border-radius:2px;outline:none;width:100%;box-sizing:border-box}
  input:focus,select:focus{border-color:var(--cyan);background:var(--bg-2)}
  .slider{display:flex;align-items:center;gap:10px}
  .slider input[type=range]{flex:1;min-width:0;accent-color:var(--accent)}
  .val{font-family:var(--font-mono);font-size:12px;color:var(--accent);width:34px;text-align:right;flex-shrink:0}
</style>
</head>
<body>
<div class="card">

  <div class="group">
    <div class="gh"><span class="dot" style="background:var(--cyan)"></span>Red / Servidor</div>
    <div class="row r3">
      <div class="field"><label>Modo red</label>
        <select><option>Local</option><option>Broadcast</option><option>Multicast</option><option>IP directa</option></select>
      </div>
      <div class="field"><label>Host</label><input value="127.0.0.1"></div>
      <div class="field"><label>Puerto</label><input value="1234"></div>
    </div>
  </div>

  <div class="group">
    <div class="gh"><span class="dot" style="background:var(--accent)"></span>Captura</div>
    <div class="row r2">
      <div class="field"><label>FPS</label>
        <div class="slider"><input type="range" min="10" max="60" value="30"><span class="val">30</span></div>
      </div>
      <div class="field"><label>Resolución</label>
        <select><option>640×480</option><option>1280×720</option><option>1920×1080</option></select>
      </div>
    </div>
  </div>

  <div class="group">
    <div class="gh"><span class="dot" style="background:var(--amber)"></span>Imagen</div>
    <div class="row r2">
      <div class="field"><label>Brillo</label>
        <div class="slider"><input type="range" min="-50" max="50" value="0"><span class="val">0</span></div>
      </div>
      <div class="field"><label>Contraste</label>
        <div class="slider"><input type="range" min="-50" max="50" value="10"><span class="val">+10</span></div>
      </div>
    </div>
  </div>

</div>
</body>
</html>
