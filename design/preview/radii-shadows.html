<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-0);color:var(--fg-0);font-family:var(--font-mono)}
  .card{padding:24px;box-sizing:border-box;width:700px;height:220px;display:flex;flex-direction:column;gap:18px}
  .group{display:flex;gap:18px;align-items:center}
  .lbl{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--fg-2);width:90px}
  .sample{width:60px;height:48px;background:var(--bg-1);border:1px solid var(--bg-3);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--fg-2)}
  .glow{box-shadow:0 0 20px rgba(157,255,78,.35);border-color:var(--accent)}
  .elev{box-shadow:0 4px 12px rgba(0,0,0,.6)}
  .hair{box-shadow:0 1px 0 var(--bg-3)}
  .r0{border-radius:0}.r1{border-radius:2px}.r2{border-radius:4px}.rp{border-radius:999px;width:72px;height:24px}
</style>
</head>
<body>
<div class="card">
  <div class="group"><span class="lbl">radii</span>
    <div class="sample r0">0</div>
    <div class="sample r1">2</div>
    <div class="sample r2">4</div>
    <div class="sample rp">pill</div>
  </div>
  <div class="group"><span class="lbl">shadows</span>
    <div class="sample hair">hairline</div>
    <div class="sample elev">elev</div>
    <div class="sample glow" style="color:var(--accent)">glow</div>
    <div class="sample" style="border-style:dashed">dashed</div>
  </div>
</div>
</body>
</html>
