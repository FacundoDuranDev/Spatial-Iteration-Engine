<!doctype html>
<!--
  ════════════════════════════════════════════════════════════════
  NOTA · Por qué este HTML NO incluye "Built with Gradio · Settings"
  ════════════════════════════════════════════════════════════════
  Esta UI no usa Gradio. Es una vanilla HTML/CSS/JS app servida
  por FastAPI/uvicorn. Se omitió a propósito el footer estándar
  de cualquier framework por:
    1. Es un product surface mobile-first para uso en performance
       en vivo (VJ), no un demo de framework.
    2. El footer rompía el sticky-bar Iniciar/Detener al pie.
    3. Distrae visualmente del contexto en penumbra de teatro/club.
  Si en el futuro se reintroduce algún framework con chrome propia,
  esta nota debe actualizarse Y discutirse antes de mergear.
  Ver: docs/decisions/web_dashboard.md (a crear en Phase E)
  ════════════════════════════════════════════════════════════════
-->
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>SIE · Control</title>
  <!-- PWA / installable shortcut. Open the URL in Chrome (Android) or
       Safari (iOS) and use "Add to home screen" / "Install app" so it
       launches in standalone mode without browser chrome. -->
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/static/icons/icon-180.png" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" />
  <link rel="stylesheet" href="/static/v3.css" />
</head>
<body class="theme-stage">
  <div id="app" class="screen">
    <header id="hd" class="hd" data-view="hub">
      <button id="back-btn" class="back hidden" type="button" aria-label="Atr&aacute;s">
        <span class="gly">&#8249;</span>
      </button>
      <h1 id="hd-title" class="ttl">SIE &middot; Control</h1>
      <div id="kpis" class="kpis">
        <span class="kpi"><b id="fps">0.0</b> fps</span>
        <span class="sep">&middot;</span>
        <span class="kpi"><b id="lat">0.0</b> ms</span>
      </div>
      <span id="track-indicator" class="track-indicator hidden" title="Detecci&oacute;n viva">
        <span class="ti-face hidden"><span class="gly">&#128064;</span><b id="ti-face-n">0</b></span>
        <span class="ti-hands hidden"><span class="gly">&#9995;</span><b id="ti-hands-n">0</b></span>
      </span>
      <span id="pill" class="pill"><span class="dot"></span><span id="pill-label">OFFLINE</span></span>
    </header>

    <main class="body" id="body">
      <section id="view-hub" class="view view-hub">
        <div class="hub-grid" id="hub-grid">
          <article class="cat" data-cat="DISTORT">
            <span class="cap">DISTORT</span>
            <span class="name">Distorsi&oacute;n</span>
            <span class="meta"><span class="meta-count" data-cat="DISTORT">0 activos / 0 total</span></span>
            <div class="chips" data-chips="DISTORT"></div>
          </article>
          <article class="cat" data-cat="COLOR">
            <span class="cap">COLOR</span>
            <span class="name">Color</span>
            <span class="meta"><span class="meta-count" data-cat="COLOR">0 activos / 0 total</span></span>
            <div class="chips" data-chips="COLOR"></div>
          </article>
          <article class="cat" data-cat="GLITCH">
            <span class="cap">GLITCH</span>
            <span class="name">Glitch</span>
            <span class="meta"><span class="meta-count" data-cat="GLITCH">0 activos / 0 total</span></span>
            <div class="chips" data-chips="GLITCH"></div>
          </article>
          <article class="cat" data-cat="STYLIZE">
            <span class="cap">STYLIZE</span>
            <span class="name">Estilo</span>
            <span class="meta"><span class="meta-count" data-cat="STYLIZE">0 activos / 0 total</span></span>
            <div class="chips" data-chips="STYLIZE"></div>
          </article>
          <article class="cat cat-tracking" data-cat="TRACKING">
            <span class="cap">TRACKING</span>
            <span class="name">Tracking</span>
            <span class="meta"><span class="meta-count" data-cat="TRACKING">0 fuentes activas</span></span>
            <div class="chips" data-chips="TRACKING"></div>
          </article>
          <article class="cat cat-modulations" data-cat="MOD">
            <span class="cap">MAPEOS</span>
            <span class="name">Mapeos</span>
            <span class="meta"><span class="meta-count" data-cat="MOD">0 mapeos</span></span>
            <div class="chips" data-chips="MOD"></div>
          </article>
          <article class="cat cat-projection" data-cat="PROJ">
            <span class="cap">MAPPING</span>
            <span class="name">Proyecci&oacute;n</span>
            <span class="meta"><span class="meta-count" data-cat="PROJ">apagado</span></span>
            <div class="chips" data-chips="PROJ"></div>
          </article>
        </div>
      </section>

      <section id="view-cat" class="view view-cat hidden">
        <div class="list" id="cat-list"></div>
      </section>

      <section id="view-detail" class="view view-detail hidden">
        <div class="detail" id="detail-body"></div>
      </section>

      <section id="view-mod-list" class="view view-mod-list hidden">
        <div class="mod-list" id="mod-list-body"></div>
      </section>

      <section id="view-mod-create" class="view view-mod-create hidden">
        <div class="mod-create" id="mod-create-body"></div>
      </section>

      <section id="view-projection" class="view view-projection hidden">
        <div class="proj" id="proj-body"></div>
      </section>
    </main>

    <footer id="ft" class="ft">
      <button id="clear-btn" class="btn ghost hidden" type="button" aria-label="Limpiar todos los filtros">
        <span id="clear-label">Limpiar</span>
      </button>
      <button id="primary-btn" class="btn primary" type="button">
        <span class="gly">&#9654;</span> <span id="primary-label">Iniciar</span>
      </button>
    </footer>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
