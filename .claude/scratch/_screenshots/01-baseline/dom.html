   #000;\n  --siev2-surface:      #0a0a0a;\n  --siev2-surface-high: #141414;\n  --siev2-line:         #1c1c1c;\n  --siev2-line-strong:  #3f3f3f;\n  --siev2-hd-bg:        #050505;\n\n  --siev2-text:   #ffffff;\n  --siev2-text-2: #c9c9c9;\n  --siev2-text-3: #7a7a7a;\n\n  --siev2-accent:        #22f1d0;\n  --siev2-accent-soft:   rgba(34, 241, 208, 0.12);\n  --siev2-on-accent:     #000;\n  --siev2-danger:        #ff5a4e;\n  --siev2-glow-sm:       0 0 8px rgba(34, 241, 208, 0.5);\n  --siev2-glow:          0 0 12px rgba(34, 241, 208, 0.55), 0 0 4px rgba(34, 241, 208, 0.95);\n  --siev2-glow-lg:       0 0 28px rgba(34, 241, 208, 0.65), 0 0 6px rgba(34, 241, 208, 1);\n\n  --siev2-font-ui:   \u0027Space Grotesk\u0027, system-ui, sans-serif;\n  --siev2-font-mono: \u0027Space Mono\u0027, ui-monospace, monospace;\n\n  --siev2-fs-xs: 13px; --siev2-fs-sm: 16px; --siev2-fs-md: 19px;\n  --siev2-fs-lg: 26px; --siev2-fs-xl: 32px;\n\n  --siev2-sp-1: 6px; --siev2-sp-2: 10px; --siev2-sp-3: 16px; --siev2-sp-4: 22px;\n  --siev2-hit: 64px;\n}\n\n/* ── Page-level overrides for Gradio ──────────────────────────── */\nbody.gradio-container,\n.gradio-container,\nbody { background: var(--siev2-bg) !important; color: var(--siev2-text) !important; }\n.gradio-container { padding: 0 !important; max-width: 440px !important; }\n.gradio-container .main { gap: 0 !important; }\n\n/* Gradio wraps blocks; tame the chrome. */\n.gradio-container .block,\n.gradio-container .gradio-group,\n.gradio-container .gradio-row,\n.gradio-container .gradio-column {\n  background: transparent !important;\n  border: none !important;\n  box-shadow: none !important;\n  padding: 0 !important;\n  margin: 0 !important;\n}\n\n/* ── Header chrome ────────────────────────────────────────────── */\n.siev2-hd {\n  display: flex; align-items: center; gap: var(--siev2-sp-3);\n  padding: var(--siev2-sp-2) var(--siev2-sp-3);\n  background: var(--siev2-hd-bg);\n  border-bottom: 1px solid var(--siev2-line);\n  min-height: 56px;\n  font-family: var(--siev2-font-ui);\n  position: sticky; top: 0; z-index: 5;\n}\n.siev2-hd .ttl {\n  flex: 1; min-width: 0;\n  font-size: var(--siev2-fs-md); font-weight: 600;\n  letter-spacing: -0.015em;\n  color: var(--siev2-text);\n}\n.siev2-hd .pill {\n  display: inline-flex; align-items: center; gap: 6px;\n  padding: 6px 12px;\n  font-family: var(--siev2-font-mono); font-size: var(--siev2-fs-xs);\n  letter-spacing: 0.08em; text-transform: uppercase;\n  border: 1px solid var(--siev2-line-strong);\n  color: var(--siev2-text-2);\n}\n.siev2-hd .pill.on {\n  color: var(--siev2-accent);\n  border-color: var(--siev2-accent);\n  background: var(--siev2-accent-soft);\n  box-shadow: var(--siev2-glow-sm);\n}\n.siev2-hd .pill .dot {\n  width: 8px; height: 8px; border-radius: 50%;\n  background: var(--siev2-text-3);\n}\n.siev2-hd .pill.on .dot {\n  background: var(--siev2-accent);\n  box-shadow: var(--siev2-glow-sm);\n}\n\n.siev2-kpis {\n  display: flex; gap: var(--siev2-sp-3); align-items: center;\n  padding: 6px var(--siev2-sp-3) 10px;\n  font-family: var(--siev2-font-mono); font-size: var(--siev2-fs-xs);\n  color: var(--siev2-text-2);\n  background: var(--siev2-hd-bg);\n  border-bottom: 1px solid var(--siev2-line);\n}\n.siev2-kpis b { color: var(--siev2-accent); font-weight: 500; text-shadow: var(--siev2-glow-sm); }\n.siev2-kpis .sep { color: var(--siev2-text-3); }\n\n/* ── Hub buttons (gr.Button styled as cards) ──────────────────── */\n.siev2-hubrow {\n  display: grid !important;\n  grid-template-columns: 1fr 1fr;\n  gap: 10px;\n  padding: 16px;\n}\n.siev2-hubrow \u003e * { flex: unset !important; min-width: 0 !important; }\n\nbutton.siev2-cat-btn,\n.siev2-cat-btn button,\n.siev2-cat-btn {\n  background: var(--siev2-surface) !important;\n  color: var(--siev2-text) !important;\n  border: 1px solid var(--siev2-line) !important;\n  border-radius: 0 !important;\n  min-height: 110px !important;\n  padding: 16px !important;\n  font-family: var(--siev2-font-ui) !important;\n  font-size: var(--siev2-fs-lg) !important;\n  font-weight: 600 !important;\n  letter-spacing: -0.02em !important;\n  text-align: left !important;\n  white-space: pre-wrap !important;\n  box-shadow: none !important;\n  cursor: pointer;\n  touch-action: manipulation;\n  display: flex !important;\n  flex-direction: column !important;\n  justify-content: flex-end !important;\n}\n.siev2-cat-btn:hover { background: var(--siev2-surface-high) !important; }\n\n/* ── Filter list rows ─────────────────────────────────────────── */\n.siev2-section-cap {\n  font-family: var(--siev2-font-mono);\n  font-size: var(--siev2-fs-xs);\n  text-transform: uppercase;\n  letter-spacing: 0.14em;\n  color: var(--siev2-text-3);\n  padding: var(--siev2-sp-3) var(--siev2-sp-3) var(--siev2-sp-2);\n}\n.siev2-row {\n  display: flex !important;\n  align-items: center;\n  gap: var(--siev2-sp-2);\n  padding: 12px var(--siev2-sp-3);\n  margin: 0 var(--siev2-sp-3) var(--siev2-sp-2);\n  background: var(--siev2-surface);\n  border: 1px solid var(--siev2-line);\n  min-height: var(--siev2-hit);\n}\n.siev2-row .siev2-row-name {\n  flex: 1;\n  font-family: var(--siev2-font-ui);\n  font-size: var(--siev2-fs-md);\n  font-weight: 600;\n  letter-spacing: -0.005em;\n  color: var(--siev2-text);\n  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\n}\n\n/* The \"open detail\" button next to each filter row */\n.siev2-open-btn,\n.siev2-open-btn button,\nbutton.siev2-open-btn {\n  flex: 0 0 auto !important;\n  min-width: 64px !important;\n  min-height: 48px !important;\n  background: transparent !important;\n  color: var(--siev2-accent) !important;\n  border: 1px solid var(--siev2-line-strong) !important;\n  border-radius: 0 !important;\n  font-family: var(--siev2-font-mono) !important;\n  font-size: 18px !important;\n  padding: 0 12px !important;\n  box-shadow: none !important;\n}\n.siev2-open-btn:hover { background: var(--siev2-surface-high) !important; }\n\n/* ── Back / page-action buttons (Volver, ‹, Reset, etc.) ─────── */\n.siev2-back-btn,\n.siev2-back-btn button,\nbutton.siev2-back-btn {\n  background: var(--siev2-surface) !important;\n  color: var(--siev2-text) !important;\n  border: 1px solid var(--siev2-line-strong) !important;\n  border-radius: 0 !important;\n  min-height: 56px !important;\n  padding: 0 var(--siev2-sp-3) !important;\n  font-family: var(--siev2-font-ui) !important;\n  font-size: var(--siev2-fs-sm) !important;\n  font-weight: 600 !important;\n  letter-spacing: 0.05em !important;\n  box-shadow: none !important;\n}\n\n/* ── Detail page chrome ───────────────────────────────────────── */\n.siev2-detail-meta {\n  font-family: var(--siev2-font-mono);\n  font-size: var(--siev2-fs-xs);\n  color: var(--siev2-text-3);\n  padding: var(--siev2-sp-2) var(--siev2-sp-3) var(--siev2-sp-3);\n  border-bottom: 1px solid var(--siev2-line);\n}\n.siev2-detail-meta b { color: var(--siev2-text-2); font-weight: 500; }\n\n/* The detail body wraps every widget — give them breathing room */\n.siev2-detail-body {\n  display: flex !important;\n  flex-direction: column !important;\n  gap: 18px !important;\n  padding: 18px var(--siev2-sp-3) 80px !important;\n}\n\n/* Tighten Gradio\u0027s labels inside the detail */\n.siev2-detail-body label,\n.siev2-detail-body .gradio-label {\n  font-family: var(--siev2-font-mono) !important;\n  font-size: var(--siev2-fs-xs) !important;\n  text-transform: uppercase;\n  letter-spacing: 0.1em;\n  color: var(--siev2-text-2) !important;\n}\n\n/* ── Page title (Markdown ### headings) ───────────────────────── */\n.siev2-page-title h3,\n.siev2-page-title h2 {\n  font-family: var(--siev2-font-ui) !important;\n  font-size: var(--siev2-fs-md) !important;\n  color: var(--siev2-text) !important;\n  margin: 0 !important;\n  padding: 0 !important;\n  letter-spacing: -0.015em !important;\n}\n\n/* ── Footer (sticky Start/Stop) ───────────────────────────────── */\n.siev2-footer {\n  position: sticky;\n  bottom: 0;\n  background: var(--siev2-hd-bg) !important;\n  border-top: 1px solid var(--siev2-line);\n  padding: var(--siev2-sp-3) !important;\n  z-index: 5;\n}\n.siev2-startstop,\n.siev2-startstop button,\nbutton.siev2-startstop {\n  width: 100% !important;\n  min-height: var(--siev2-hit) !important;\n  background: var(--siev2-accent) !important;\n  color: var(--siev2-on-accent) !important;\n  border: 1px solid var(--siev2-accent) !important;\n  border-radius: 0 !important;\n  font-family: var(--siev2-font-ui) !important;\n  font-size: var(--siev2-fs-sm) !important;\n  font-weight: 700 !important;\n  letter-spacing: 0.1em !important;\n  text-transform: uppercase !important;\n  box-shadow: var(--siev2-glow-lg) !important;\n}\n.siev2-startstop.danger,\n.siev2-startstop.danger button {\n  background: transparent !important;\n  color: var(--siev2-danger) !important;\n  border-color: var(--siev2-danger) !important;\n  box-shadow: 0 0 16px rgba(255,90,78,0.25) !important;\n}\n\n/* ── Live status under the footer ─────────────────────────────── */\n.siev2-status,\n.siev2-status p {\n  font-family: var(--siev2-font-mono) !important;\n  font-size: 11px !important;\n  color: var(--siev2-text-3) !important;\n  text-align: center !important;\n  padding: 6px var(--siev2-sp-3) !important;\n  margin: 0 !important;\n}\n\n/* ── Hub row (header for Cat) ─────────────────────────────────── */\n.siev2-page-header {\n  display: flex !important;\n  align-items: center !important;\n  gap: var(--siev2-sp-2) !important;\n  padding: var(--siev2-sp-2) var(--siev2-sp-3) !important;\n  background: var(--siev2-hd-bg) !important;\n  border-bottom: 1px solid var(--siev2-line) !important;\n  position: sticky; top: 0; z-index: 4;\n}\n.siev2-page-header \u003e * { flex: 0 0 auto !important; }\n.siev2-page-header .siev2-page-title { flex: 1 !important; }\n\n/* Load Space Grotesk + Space Mono fonts (fallback handled in tokens). */\n@import url(\u0027https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700\u0026family=Space+Mono:wght@400;700\u0026display=swap\u0027);\n","connect_heartbeat":true,"js":"","head":"\u003cstyle\u003e/* ============================================================\n   Spatial-Iteration-Engine · Mobile Control Surface widget kit\n   Ported from design/ui_kits/mcp_v2/{tokens,components}.css.\n   Every class is prefixed with sie- to avoid clashing with\n   Gradio\u0027s built-in stylesheet. Scope everything to .sie-root.\n   ============================================================ */\n\n/* Visually-hidden helper: the backing gr.Number / gr.Checkbox lives in\n   the DOM so JS can read / write its \u003cinput\u003e, but takes zero visual space. */\n.sie-hidden-host {\n  position: absolute !important;\n  left: -9999px !important;\n  top: auto !important;\n  width: 1px !important;\n  height: 1px !important;\n  overflow: hidden !important;\n  pointer-events: none !important;\n  opacity: 0 !important;\n}\n\n.sie-root {\n  /* ---- Palette ---- */\n  --sie-bg:            #05060b;\n  --sie-surface:       #0e1018;\n  --sie-surface-high:  #141724;\n  --sie-line:          #1a1d2a;\n  --sie-line-strong:   #262a3c;\n  --sie-text:          #ffffff;\n  --sie-text-2:        #8891a6;\n  --sie-text-3:        #5a6278;\n  --sie-disabled:      #3a3f52;\n\n  --sie-cyan:          #00fff2;\n  --sie-cyan-dim:      #00b8ae;\n  --sie-cyan-soft:     rgba(0, 255, 242, 0.08);\n  --sie-cyan-glow:     0 0 12px rgba(0, 255, 242, 0.35), 0 0 2px rgba(0, 255, 242, 0.7);\n  --sie-cyan-glow-lg:  0 0 24px rgba(0, 255, 242, 0.45), 0 0 2px rgba(0, 255, 242, 0.9);\n\n  --sie-mag:           #ff2bd6;\n  --sie-mag-dim:       #c2179f;\n  --sie-mag-soft:      rgba(255, 43, 214, 0.08);\n  --sie-mag-glow:      0 0 12px rgba(255, 43, 214, 0.35), 0 0 2px rgba(255, 43, 214, 0.7);\n\n  /* ---- Type ---- */\n  --sie-font-sans: \"Space Grotesk\", \"Inter\", -apple-system, system-ui, sans-serif;\n  --sie-font-mono: \"JetBrains Mono\", \"IBM Plex Mono\", ui-monospace, monospace;\n  --sie-fs-title:   20px;\n  --sie-fs-row:     16px;\n  --sie-fs-label:   13px;\n  --sie-fs-readout: 16px;\n  --sie-fs-kpi:     13px;\n  --sie-fs-micro:   11px;\n  --sie-tracking-label: 0.04em;\n  --sie-tracking-kicker: 0.18em;\n\n  /* ---- Spacing (4pt) ---- */\n  --sie-sp-1: 4px; --sie-sp-2: 8px; --sie-sp-3: 12px; --sie-sp-4: 16px;\n  --sie-sp-5: 20px; --sie-sp-6: 24px; --sie-sp-7: 32px; --sie-sp-8: 40px;\n  --sie-gutter:   16px;\n  --sie-card-pad: 16px;\n  --sie-row-h:    64px;\n\n  /* ---- Radii ---- */\n  --sie-r-s:  6px; --sie-r-m: 10px; --sie-r-l: 14px; --sie-r-pill: 999px;\n\n  /* ---- Motion ---- */\n  --sie-ease:     cubic-bezier(0.4, 0, 0.2, 1);\n  --sie-dur:      150ms;\n  --sie-dur-fast: 80ms;\n\n  background: var(--sie-bg);\n  color: var(--sie-text);\n  font-family: var(--sie-font-sans);\n  -webkit-font-smoothing: antialiased;\n  font-size: 14px;\n  line-height: 1.4;\n  box-sizing: border-box;\n}\n.sie-root *, .sie-root *::before, .sie-root *::after { box-sizing: border-box; }\n\n.sie-num {\n  font-family: var(--sie-font-mono);\n  font-variant-numeric: tabular-nums;\n  letter-spacing: 0;\n}\n\n/* ============================================================\n   Status pill — running / stopped\n   ============================================================ */\n.sie-pill {\n  display: inline-flex; align-items: center; gap: 8px;\n  padding: 6px 12px; border-radius: var(--sie-r-pill);\n  font-family: var(--sie-font-mono); font-size: 11px;\n  letter-spacing: 0.1em; text-transform: uppercase;\n  border: 1px solid var(--sie-text-3);\n  color: var(--sie-text-2);\n}\n.sie-pill-running {\n  color: var(--sie-cyan);\n  border-color: var(--sie-cyan);\n  background: var(--sie-cyan-soft);\n  text-shadow: 0 0 6px rgba(0,255,242,0.4);\n}\n.sie-pill-dot {\n  width: 6px; height: 6px; border-radius: 50%;\n  background: var(--sie-text-3);\n  flex-shrink: 0;\n}\n.sie-pill-running .sie-pill-dot {\n  background: var(--sie-cyan);\n  box-shadow: 0 0 6px var(--sie-cyan);\n  animation: sie-pulse 2.4s ease-in-out infinite;\n}\n.sie-pill-stopped .sie-pill-dot {\n  background: transparent;\n  border: 1.5px solid var(--sie-text-3);\n  width: 8px; height: 8px;\n}\n@keyframes sie-pulse {\n  0%, 100% { opacity: 1; transform: scale(1); }\n  50%      { opacity: 0.55; transform: scale(0.85); }\n}\n\n/* ============================================================\n   Category card (Hub)\n   ============================================================ */\n.sie-card-grid {\n  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;\n  padding: 8px 16px 16px;\n}\n.sie-cat-card {\n  position: relative;\n  background: var(--sie-surface);\n  border: 1px solid var(--sie-line);\n  border-radius: var(--sie-r-m);\n  padding: 16px;\n  min-height: 160px;\n  color: var(--sie-text);\n  cursor: pointer;\n  display: flex; flex-direction: column; gap: 12px;\n  font-family: var(--sie-font-sans);\n  text-align: left;\n  transition: background var(--sie-dur) var(--sie-ease), border-color var(--sie-dur) var(--sie-ease);\n}\n.sie-cat-card:active { background: var(--sie-surface-high); transform: scale(0.98); }\n.sie-cat-card.sie-has-active::before {\n  content: \"\";\n  position: absolute; left: 0; top: 12px; bottom: 12px;\n  width: 2px; background: var(--sie-cyan);\n  box-shadow: 0 0 6px rgba(0,255,242,0.6);\n  border-radius: 1px;\n}\n.sie-cat-name {\n  font-family: var(--sie-font-sans);\n  font-size: var(--sie-fs-row); font-weight: 600;\n  letter-spacing: var(--sie-tracking-label);\n  text-transform: uppercase;\n  margin-top: auto;\n}\n.sie-cat-count {\n  font-family: var(--sie-font-mono); font-size: var(--sie-fs-kpi);\n  color: var(--sie-text-3); letter-spacing: 0.08em;\n  text-transform: uppercase;\n}\n.sie-cat-count.sie-on {\n  color: var(--sie-cyan);\n  text-shadow: 0 0 6px rgba(0,255,242,0.35);\n}\n\n/* ============================================================\n   Filter row (category detail, expand-inline)\n   ============================================================ */\n.sie-row {\n  background: var(--sie-surface);\n  border: 1px solid var(--sie-line);\n  border-radius: var(--sie-r-m);\n  overflow: hidden;\n  position: relative;\n  margin-bottom: 10px;\n}\n.sie-row-head {\n  display: flex; align-items: center; gap: 12px;\n  padding: 0 16px; min-height: var(--sie-row-h); height: var(--sie-row-h);\n  cursor: pointer;\n}\n.sie-row-name {\n  flex: 1; min-width: 0;\n  font-family: var(--sie-font-sans); font-size: var(--sie-fs-row); font-weight: 600;\n  letter-spacing: var(--sie-tracking-label);\n  text-transform: uppercase;\n  color: var(--sie-text);\n}\n.sie-row.sie-expanded { background: var(--sie-surface-high); }\n.sie-row.sie-expanded::before {\n  content: \"\";\n  position: absolute; left: 0; top: 0; bottom: 0;\n  width: 2px; background: var(--sie-cyan);\n  box-shadow: 0 0 6px rgba(0,255,242,0.5);\n}\n.sie-row-body {\n  padding: 8px 16px 16px 16px;\n  display: flex; flex-direction: column; gap: 16px;\n  border-top: 1px dashed var(--sie-line-strong);\n}\n\n/* ============================================================\n   Toggle (on/off pill)\n   ============================================================ */\n.sie-toggle {\n  width: 52px; height: 30px; border-radius: var(--sie-r-pill);\n  background: transparent;\n  border: 1.5px solid var(--sie-line-strong);\n  position: relative; cursor: pointer;\n  transition: background var(--sie-dur) var(--sie-ease), border-color var(--sie-dur) var(--sie-ease);\n  flex-shrink: 0;\n  user-select: none; touch-action: manipulation;\n}\n.sie-toggle-thumb {\n  position: absolute;\n  top: 3px; left: 3px;\n  width: 21px; height: 21px;\n  border-radius: 50%;\n  background: var(--sie-text-3);\n  transition: transform var(--sie-dur) var(--sie-ease), background var(--sie-dur) var(--sie-ease);\n}\n.sie-toggle.sie-on {\n  border-color: var(--sie-cyan);\n  background: var(--sie-cyan-soft);\n  box-shadow: 0 0 12px rgba(0,255,242,0.25);\n}\n.sie-toggle.sie-on .sie-toggle-thumb {\n  transform: translateX(21px);\n  background: var(--sie-cyan);\n  box-shadow: 0 0 8px var(--sie-cyan);\n}\n.sie-toggle.sie-disabled { opacity: 0.35; pointer-events: none; }\n\n/* ============================================================\n   Slider row — label + value + track + handle\n   ============================================================ */\n.sie-slider {\n  display: flex; flex-direction: column; gap: 8px;\n  user-select: none; touch-action: none;\n}\n.sie-slider-top {\n  display: flex; justify-content: space-between; align-items: baseline;\n}\n.sie-slider-label {\n  font-family: var(--sie-font-sans); font-size: var(--sie-fs-label);\n  letter-spacing: var(--sie-tracking-label); text-transform: uppercase;\n  color: var(--sie-text);\n  font-weight: 500;\n}\n.sie-slider-val {\n  font-family: var(--sie-font-mono); font-size: var(--sie-fs-readout);\n  color: var(--sie-cyan);\n  font-variant-numeric: tabular-nums;\n}\n.sie-slider-track {\n  position: relative; height: 6px; border-radius: 3px;\n  background: var(--sie-line-strong);\n  cursor: pointer;\n}\n.sie-slider-fill {\n  position: absolute; left: 0; top: 0; bottom: 0;\n  background: var(--sie-cyan); border-radius: 3px;\n  box-shadow: 0 0 8px rgba(0,255,242,0.4);\n  pointer-events: none;\n}\n.sie-slider-handle {\n  position: absolute; top: 50%;\n  transform: translate(-50%, -50%);\n  width: 22px; height: 22px; border-radius: 50%;\n  background: var(--sie-bg); border: 2px solid var(--sie-cyan);\n  box-shadow: var(--sie-cyan-glow);\n  pointer-events: none;\n}\n.sie-slider.sie-dragging .sie-slider-handle {\n  box-shadow: var(--sie-cyan-glow-lg);\n  transform: translate(-50%, -50%) scale(1.15);\n}\n\n/* ============================================================\n   Stepper (-/+)\n   ============================================================ */\n.sie-stepper {\n  display: inline-flex; align-items: stretch;\n  border: 1px solid var(--sie-line-strong); border-radius: var(--sie-r-s);\n  overflow: hidden;\n  user-select: none;\n}\n.sie-stepper-btn {\n  width: 44px; height: 40px;\n  background: transparent; color: var(--sie-text);\n  font-family: var(--sie-font-mono); font-size: 20px; line-height: 1;\n  border: none; cursor: pointer;\n}\n.sie-stepper-btn:active { background: var(--sie-surface-high); }\n.sie-stepper-val {\n  min-width: 56px; text-align: center;\n  font-family: var(--sie-font-mono); font-size: var(--sie-fs-readout);\n  color: var(--sie-cyan);\n  display: inline-flex; align-items: center; justify-content: center;\n  text-shadow: 0 0 4px rgba(0,255,242,0.3);\n  border-left: 1px solid var(--sie-line-strong);\n  border-right: 1px solid var(--sie-line-strong);\n  padding: 0 12px;\n}\n\n/* ============================================================\n   Segmented control (LINEAR / EASE…)\n   ============================================================ */\n.sie-seg {\n  display: flex; gap: 0;\n  border: 1px solid var(--sie-line-strong); border-radius: var(--sie-r-s);\n  overflow: hidden;\n}\n.sie-seg-btn {\n  flex: 1; padding: 10px 14px;\n  background: transparent; color: var(--sie-text-2);\n  font-family: var(--sie-font-sans); font-size: 12px;\n  letter-spacing: var(--sie-tracking-label); text-transform: uppercase;\n  border: none; cursor: pointer;\n  border-right: 1px solid var(--sie-line-strong);\n}\n.sie-seg-btn:last-child { border-right: none; }\n.sie-seg-btn.sie-on {\n  background: var(--sie-cyan-soft); color: var(--sie-cyan);\n  text-shadow: 0 0 6px rgba(0,255,242,0.4);\n}\n\n/* ============================================================\n   Angle dial — 140px SVG knob\n   ============================================================ */\n.sie-angle-dial {\n  display: inline-flex; flex-direction: column; align-items: center; gap: 10px;\n  user-select: none; touch-action: none; cursor: grab;\n}\n.sie-angle-dial:active { cursor: grabbing; }\n.sie-dial-label {\n  font-size: 0.82rem; opacity: 0.75; letter-spacing: 0.04em;\n  text-transform: uppercase;\n}\n.sie-dial-ring { position: relative; width: 140px; height: 140px; }\n.sie-dial-readout {\n  font-family: var(--sie-font-mono); font-size: 22px; color: var(--sie-cyan);\n  text-shadow: 0 0 8px rgba(0,255,242,0.4);\n}\n\n/* ============================================================\n   Primary / stop / ghost buttons (sticky footer)\n   ============================================================ */\n.sie-btn-primary {\n  height: 56px; border-radius: var(--sie-r-m); cursor: pointer;\n  font-family: var(--sie-font-sans); font-size: 14px; font-weight: 700;\n  letter-spacing: 0.2em;\n  background: var(--sie-cyan); color: var(--sie-bg);\n  border: 1px solid var(--sie-cyan);\n  box-shadow: var(--sie-cyan-glow-lg);\n  text-transform: uppercase;\n}\n.sie-btn-stop {\n  height: 56px; border-radius: var(--sie-r-m); cursor: pointer;\n  font-family: var(--sie-font-sans); font-size: 14px; font-weight: 700;\n  letter-spacing: 0.2em;\n  background: transparent; color: var(--sie-mag);\n  border: 1px solid var(--sie-mag);\n  box-shadow: 0 0 16px rgba(255,43,214,0.2);\n  text-shadow: 0 0 6px rgba(255,43,214,0.5);\n  text-transform: uppercase;\n}\n.sie-btn-ghost {\n  height: 56px; border-radius: var(--sie-r-m); cursor: pointer;\n  background: var(--sie-surface); color: var(--sie-text);\n  border: 1px solid var(--sie-line-strong);\n  font-family: var(--sie-font-sans); font-size: 12px; letter-spacing: var(--sie-tracking-label);\n  text-transform: uppercase; font-weight: 500;\n  padding: 0 14px;\n}\n\n/* ============================================================\n   High-Contrast Stage — theme overlay for the .sie-root widget kit\n   Source: design/ui_kits/gradio_remote/c_stage/tokens.css\n   Deep black + XL white type + phosphor cyan + giant hit targets.\n   For penumbra of theatre / club. Load AFTER widgets.css.\n   ============================================================ */\n\n@import url(\u0027https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700\u0026family=Space+Mono:wght@400;700\u0026display=swap\u0027);\n\n.sie-root {\n  --sie-bg:           #000000;\n  --sie-surface:      #0a0a0a;\n  --sie-surface-high: #141414;\n  --sie-line:         #1c1c1c;\n  --sie-line-strong:  #3f3f3f;\n  --sie-text:         #ffffff;\n  --sie-text-2:       #c9c9c9;\n  --sie-text-3:       #7a7a7a;\n  --sie-disabled:     #2a2a2a;\n\n  --sie-cyan:         #22f1d0;\n  --sie-cyan-dim:     #14a890;\n  --sie-cyan-soft:    rgba(34, 241, 208, 0.12);\n  --sie-cyan-glow:    0 0 16px rgba(34, 241, 208, 0.55), 0 0 4px rgba(34, 241, 208, 0.95);\n  --sie-cyan-glow-lg: 0 0 28px rgba(34, 241, 208, 0.65), 0 0 6px rgba(34, 241, 208, 1);\n\n  --sie-mag:          #ff5a4e;\n  --sie-mag-dim:      #b13228;\n  --sie-mag-soft:     rgba(255, 90, 78, 0.12);\n  --sie-mag-glow:     0 0 18px rgba(255, 90, 78, 0.45);\n\n  --sie-font-sans: \u0027Space Grotesk\u0027, system-ui, sans-serif;\n  --sie-font-mono: \u0027Space Mono\u0027, ui-monospace, monospace;\n\n  /* Stage = bigger everything for low-light hands. */\n  --sie-fs-title:   24px;\n  --sie-fs-row:     19px;\n  --sie-fs-label:   16px;\n  --sie-fs-readout: 22px;\n  --sie-row-h:      72px;\n  --sie-r-s:  0;\n  --sie-r-m:  0;\n  --sie-r-l:  0;\n\n  background: var(--sie-bg);\n  color: var(--sie-text);\n}\n\n/* Sharp corners across the kit. */\n.sie-root .sie-row,\n.sie-root .sie-cat-card,\n.sie-root .sie-stepper,\n.sie-root .sie-seg,\n.sie-root .sie-btn-primary,\n.sie-root .sie-btn-stop,\n.sie-root .sie-btn-ghost { border-radius: 0; }\n\n/* Heavier glow on live signal. */\n.sie-root .sie-slider-fill { box-shadow: 0 0 10px rgba(34, 241, 208, 0.55); }\n.sie-root .sie-pill-running .sie-pill-dot { box-shadow: 0 0 10px var(--sie-cyan); }\n\n/* Bigger touch targets. */\n.sie-root .sie-toggle { width: 64px; height: 36px; }\n.sie-root .sie-toggle-thumb { width: 26px; height: 26px; }\n.sie-root .sie-toggle.sie-on .sie-toggle-thumb { transform: translateX(28px); }\n.sie-root .sie-stepper-btn { width: 56px; height: 52px; font-size: 24px; }\n.sie-root .sie-stepper-val { min-width: 72px; font-size: var(--sie-fs-readout); }\n.sie-root .sie-btn-primary,\n.sie-root .sie-btn-stop,\n.sie-root .sie-btn-ghost { height: 72px; font-size: 16px; }\n\u003c/style\u003e\n\u003cscript\u003e// Spatial-Iteration-Engine — angle dial.\n// Ported SVG shape from design/ui_kits/mcp_v2/s2_distort.html.\n// Binds every .sie-angle-dial on the page, drags the pointer, and mirrors\n// the angle into the hidden Gradio Number identified by data-target.\n(() =\u003e {\n  const TWO_PI = Math.PI * 2;\n\n  function writeGradioValue(targetId, value) {\n    const host = document.getElementById(targetId);\n    if (!host) return;\n    const input = host.querySelector(\"input[type=\u0027number\u0027]\") || host.querySelector(\"input\");\n    if (!input) return;\n    input.value = value;\n    input.dispatchEvent(new Event(\"input\", { bubbles: true }));\n    input.dispatchEvent(new Event(\"change\", { bubbles: true }));\n  }\n\n  // Degrees on this dial: 0 = up, grows clockwise (UI convention).\n  // SVG point for a given angle in degrees, at given radius from center (70,70).\n  function polar(deg, r) {\n    const rad = (deg - 90) * Math.PI / 180;\n    return { x: 70 + r * Math.cos(rad), y: 70 + r * Math.sin(rad) };\n  }\n\n  // Build an arc path from 0° up to `deg` (clockwise, centered at (70,70), radius 60).\n  function arcPath(deg) {\n    const start = polar(0, 60);\n    const end = polar(deg, 60);\n    const large = deg \u003e 180 ? 1 : 0;\n    return `M${start.x.toFixed(2)},${start.y.toFixed(2)} A60,60 0 ${large},1 ${end.x.toFixed(2)},${end.y.toFixed(2)}`;\n  }\n\n  function buildSVG(dial) {\n    dial.innerHTML = `\n      \u003csvg viewBox=\"0 0 140 140\" width=\"140\" height=\"140\" aria-hidden=\"true\"\u003e\n        \u003cg stroke=\"#262a3c\" stroke-width=\"1\"\u003e\n          \u003cline x1=\"70\" y1=\"6\"   x2=\"70\" y2=\"14\"/\u003e\n          \u003cline x1=\"70\" y1=\"126\" x2=\"70\" y2=\"134\"/\u003e\n          \u003cline x1=\"6\"  y1=\"70\"  x2=\"14\" y2=\"70\"/\u003e\n          \u003    Spatial-Iteration-Engine · Mobile Control Surface widget kit
   Ported from design/ui_kits/mcp_v2/{tokens,components}.css.
   Every class is prefixed with sie- to avoid clashing with
   Gradio's built-in stylesheet. Scope everything to .sie-root.
   ============================================================ */

/* Visually-hidden helper: the backing gr.Number / gr.Checkbox lives in
   the DOM so JS can read / write its <input>, but takes zero visual space. */
.sie-hidden-host {
  position: absolute !important;
  left: -9999px !important;
  top: auto !important;
  width: 1px !important;
  height: 1px !important;
  overflow: hidden !important;
  pointer-events: none !important;
  opacity: 0 !important;
}

.sie-root {
  /* ---- Palette ---- */
  --sie-bg:            #05060b;
  --sie-surface:       #0e1018;
  --sie-surface-high:  #141724;
  --sie-line:          #1a1d2a;
  --sie-line-strong:   #262a3c;
  --sie-text:          #ffffff;
  --sie-text-2:        #8891a6;
  --sie-text-3:        #5a6278;
  --sie-disabled:      #3a3f52;

  --sie-cyan:          #00fff2;
  --sie-cyan-dim:      #00b8ae;
  --sie-cyan-soft:     rgba(0, 255, 242, 0.08);
  --sie-cyan-glow:     0 0 12px rgba(0, 255, 242, 0.35), 0 0 2px rgba(0, 255, 242, 0.7);
  --sie-cyan-glow-lg:  0 0 24px rgba(0, 255, 242, 0.45), 0 0 2px rgba(0, 255, 242, 0.9);

  --sie-mag:           #ff2bd6;
  --sie-mag-dim:       #c2179f;
  --sie-mag-soft:      rgba(255, 43, 214, 0.08);
  --sie-mag-glow:      0 0 12px rgba(255, 43, 214, 0.35), 0 0 2px rgba(255, 43, 214, 0.7);

  /* ---- Type ---- */
  --sie-font-sans: "Space Grotesk", "Inter", -apple-system, system-ui, sans-serif;
  --sie-font-mono: "JetBrains Mono", "IBM Plex Mono", ui-monospace, monospace;
  --sie-fs-title:   20px;
  --sie-fs-row:     16px;
  --sie-fs-label:   13px;
  --sie-fs-readout: 16px;
  --sie-fs-kpi:     13px;
  --sie-fs-micro:   11px;
  --sie-tracking-label: 0.04em;
  --sie-tracking-kicker: 0.18em;

  /* ---- Spacing (4pt) ---- */
  --sie-sp-1: 4px; --sie-sp-2: 8px; --sie-sp-3: 12px; --sie-sp-4: 16px;
  --sie-sp-5: 20px; --sie-sp-6: 24px; --sie-sp-7: 32px; --sie-sp-8: 40px;
  --sie-gutter:   16px;
  --sie-card-pad: 16px;
  --sie-row-h:    64px;

  /* ---- Radii ---- */
  --sie-r-s:  6px; --sie-r-m: 10px; --sie-r-l: 14px; --sie-r-pill: 999px;

  /* ---- Motion ---- */
  --sie-ease:     cubic-bezier(0.4, 0, 0.2, 1);
  --sie-dur:      150ms;
  --sie-dur-fast: 80ms;

  background: var(--sie-bg);
  color: var(--sie-text);
  font-family: var(--sie-font-sans);
  -webkit-font-smoothing: antialiased;
  font-size: 14px;
  line-height: 1.4;
  box-sizing: border-box;
}
.sie-root *, .sie-root *::before, .sie-root *::after { box-sizing: border-box; }

.sie-num {
  font-family: var(--sie-font-mono);
  font-variant-numeric: tabular-nums;
  letter-spacing: 0;
}

/* ============================================================
   Status pill — running / stopped
   ============================================================ */
.sie-pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 12px; border-radius: var(--sie-r-pill);
  font-family: var(--sie-font-mono); font-size: 11px;
  letter-spacing: 0.1em; text-transform: uppercase;
  border: 1px solid var(--sie-text-3);
  color: var(--sie-text-2);
}
.sie-pill-running {
  color: var(--sie-cyan);
  border-color: var(--sie-cyan);
  background: var(--sie-cyan-soft);
  text-shadow: 0 0 6px rgba(0,255,242,0.4);
}
.sie-pill-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--sie-text-3);
  flex-shrink: 0;
}
.sie-pill-running .sie-pill-dot {
  background: var(--sie-cyan);
  box-shadow: 0 0 6px var(--sie-cyan);
  animation: sie-pulse 2.4s ease-in-out infinite;
}
.sie-pill-stopped .sie-pill-dot {
  background: transparent;
  border: 1.5px solid var(--sie-text-3);
  width: 8px; height: 8px;
}
@keyframes sie-pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%      { opacity: 0.55; transform: scale(0.85); }
}

/* ============================================================
   Category card (Hub)
   ============================================================ */
.sie-card-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  padding: 8px 16px 16px;
}
.sie-cat-card {
  position: relative;
  background: var(--sie-surface);
  border: 1px solid var(--sie-line);
  border-radius: var(--sie-r-m);
  padding: 16px;
  min-height: 160px;

// Spatial-Iteration-Engine — slider row.
// Drag the track to set a value; writes to the hidden Gradio Number
// identified by data-target. Keeps fill, handle, and readout in sync.
(() => {
  function writeGradioValue(targetId, value) {
    const host = document.getElementById(targetId);
    if (!host) return;
    const input = host.querySelector("input[type='number']") || host.querySelector("input");

    const handle = slider.querySelector(".sie-slider-handle");
    const readout = slider.querySelector(".sie-slider-val");

    let value = min;
    const decimals = (() => {
      const s = String(step);
      const i = s.indexOf(".");
      return i < 0 ? 0 : s.length - i - 1;

    const fmt = (v) => (decimals ? v.toFixed(decimals) : String(Math.round(v))) + unit;
